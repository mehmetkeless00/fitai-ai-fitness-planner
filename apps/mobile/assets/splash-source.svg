<?xml version="1.0" encoding="UTF-8"?>
<!--
  FitFlow Splash Screen — Source SVG
  Export at 2x: 1242×2688 (iPhone 15 Pro Max) or 1290×2796.
  viewBox mirrors iPhone proportions (390×844 @1x).
  Set app.json splash.backgroundColor to #091220 to match.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="390" y2="844" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E1E34"/>
      <stop offset="1" stop-color="#070F1C"/>
    </linearGradient>
    <linearGradient id="blWave" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1ED8FF"/>
      <stop offset="1" stop-color="#1255C4"/>
    </linearGradient>
    <linearGradient id="grWave" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22E272"/>
      <stop offset="1" stop-color="#0A9444"/>
    </linearGradient>
    <linearGradient id="wordBl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1ED8FF"/>
      <stop offset="1" stop-color="#1255C4"/>
    </linearGradient>
    <linearGradient id="wordGr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22E272"/>
      <stop offset="1" stop-color="#0A9444"/>
    </linearGradient>
    <clipPath id="iconClip">
      <rect x="95" y="228" width="200" height="200" rx="44"/>
    </clipPath>
  </defs>

  <!-- Full-screen background -->
  <rect width="390" height="844" fill="url(#pageBg)"/>

  <!-- ─── Icon mark (centered at 195, 328) ─── -->

  <!-- Icon background -->
  <rect x="95" y="228" width="200" height="200" rx="44" fill="url(#pageBg)"/>

  <g clip-path="url(#iconClip)">
    <!-- Blue wave -->
    <path d="M77,368 C117,326 179,300 250,310 C275,314 292,324 317,316"
          stroke="url(#blWave)" stroke-width="54" stroke-linecap="round" fill="none"/>
    <!-- Green wave -->
    <path d="M77,404 C115,364 175,336 245,346 C269,351 287,362 317,352"
          stroke="url(#grWave)" stroke-width="37" stroke-linecap="round" fill="none"/>

    <!-- Leaf teardrop -->
    <ellipse cx="245" cy="268" rx="10" ry="16" fill="#22E272" transform="rotate(-18 245 268)"/>
    <ellipse cx="247" cy="263" rx="5" ry="8" fill="#64F8A8" opacity="0.45" transform="rotate(-18 247 263)"/>

    <!-- Runner (dark knockout) -->
    <circle cx="213" cy="288" r="13" fill="#091220"/>
    <circle cx="213" cy="288" r="13" fill="none" stroke="rgba(160,210,255,0.15)" stroke-width="2"/>
    <path d="M213,301 C209,314 201,328 190,343" stroke="#091220" stroke-width="13" stroke-linecap="round" fill="none"/>
    <path d="M208,310 C218,300 232,291 246,287" stroke="#091220" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M208,310 C197,320 186,332 180,345" stroke="#091220" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M190,343 C202,357 215,373 224,387" stroke="#091220" stroke-width="11" stroke-linecap="round" fill="none"/>
    <path d="M224,387 C229,397 226,405 215,403" stroke="#091220" stroke-width="9" stroke-linecap="round" fill="none"/>
    <path d="M190,343 C177,357 164,371 156,385" stroke="#091220" stroke-width="11" stroke-linecap="round" fill="none"/>
    <path d="M156,385 C150,395 143,397 140,390" stroke="#091220" stroke-width="9" stroke-linecap="round" fill="none"/>
  </g>

  <!-- ─── Wordmark ─── -->

  <!-- "Fit" in blue gradient -->
  <text x="158" y="478" font-size="52" font-weight="800" letter-spacing="-1.5" fill="#1ED8FF">Fit</text>

  <!-- "Flow" in green gradient -->
  <text x="218" y="478" font-size="52" font-weight="800" letter-spacing="-1.5" fill="#22E272">Flow</text>

  <!-- Tagline -->
  <text x="195" y="512" font-size="16" fill="rgba(160,200,240,0.55)" text-anchor="middle" letter-spacing="0.5">
    Your AI Fitness Coach
  </text>

  <!-- Bottom safe area pulse dots (optional visual) -->
  <circle cx="185" cy="790" r="3" fill="rgba(30,216,255,0.25)"/>
  <circle cx="195" cy="790" r="3" fill="rgba(34,226,114,0.45)"/>
  <circle cx="205" cy="790" r="3" fill="rgba(30,216,255,0.25)"/>

</svg>
