<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E1E34"/>
      <stop offset="1" stop-color="#070F1C"/>
    </linearGradient>
    <linearGradient id="bl" x1="0" y1="0" x2="64" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1ED8FF"/>
      <stop offset="1" stop-color="#1255C4"/>
    </linearGradient>
    <linearGradient id="gr" x1="0" y1="0" x2="64" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22E272"/>
      <stop offset="1" stop-color="#0A9444"/>
    </linearGradient>
    <clipPath id="c"><rect width="64" height="64" rx="14"/></clipPath>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <g clip-path="url(#c)">
    <!-- Blue wave -->
    <path d="M-4,40 C8,26 24,20 44,22 S62,28 70,25"
          stroke="url(#bl)" stroke-width="16" stroke-linecap="round" fill="none"/>
    <!-- Green wave -->
    <path d="M-4,53 C8,39 24,33 44,35 S62,41 70,38"
          stroke="url(#gr)" stroke-width="11" stroke-linecap="round" fill="none"/>
    <!-- Leaf -->
    <ellipse cx="44" cy="13" rx="5" ry="8" fill="#22E272" transform="rotate(-18 44 13)"/>
    <ellipse cx="45" cy="10" rx="2.5" ry="4" fill="#64F8A8" opacity="0.45" transform="rotate(-18 45 10)"/>
  </g>
</svg>
